# Stellar 主题配置

######## 首页 ########
logo:
  avatar: '[{config.avatar}](/about/)'
  title: "[Mary's Blog](/)"
  subtitle: 'Android & AI'

# 侧边栏导航菜单
menubar:
  columns: 4
  items:
    - id: post
      theme: '#1BCDFC'
      icon: '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="currentColor" d="M5 3a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H5zm4 4h6v2H9V7zm0 4h6v2H9v-2zm0 4h4v2H9v-2z"/></svg>'
      title: 博客
      url: /
    - id: categories
      theme: '#3DC550'
      icon: '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="currentColor" d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-6l-2-2H5a2 2 0 0 0-2 2z"/></svg>'
      title: 分类
      url: /categories/
    - id: tags
      theme: '#FA6400'
      icon: '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="currentColor" d="M2 12l9.5-9.5a3 3 0 0 1 4.2 0l7.8 7.8a3 3 0 0 1 0 4.2L15.5 20.7a3 3 0 0 1-4.2 0L2 12zm5.5 2.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/></svg>'
      title: 标签
      url: /tags/
    - id: about
      theme: '#F44336'
      icon: '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4s-4 1.79-4 4s1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'
      title: 关于
      url: /about/

# 页脚社交链接
footer:
  social:
    github:
      icon: '<img src="https://gcore.jsdelivr.net/gh/cdn-x/placeholder@1.0.12/social/08a41b181ce68.svg"/>'
      url: https://github.com/maryyMa
  content: |
    本站由 [{author.name}](/) 使用 [{theme.name} {theme.version}]({theme.tree}) 主题创建。


######## 文章 ########
article:
  type: tech
  auto_excerpt: 200
  license: '本文采用 [署名-非商业性使用-相同方式共享 4.0 国际](https://creativecommons.org/licenses/by-nc-sa/4.0/) 许可协议，转载请注明出处。'
  share: [wechat, weibo, link]

# 文章页面布局
site_tree:
  home:
    leftbar: welcome, recent
    rightbar:
  index_blog:
    base_dir:
    menu_id: post
    leftbar: welcome, recent
    rightbar:
  post:
    menu_id: post
    leftbar: related, recent
    rightbar: toc


######## 侧边栏 ########
# 侧边栏组件说明：
# welcome - 欢迎卡片
# recent - 最近文章
# toc - 文章目录
# related - 相关文章


######## 搜索 ########
search:
  service: local_search
  local_search:
    field: post
    path: /search.json
    content: true


######## 样式 ########
style:
  prefers_theme: auto  # auto: 跟随系统, light: 亮色, dark: 暗色
  font-size:
    root: 16px
    body: 17px
    code: 85%
  font-family:
    body: 'system-ui, "Microsoft Yahei", "Segoe UI", Arial, sans-serif'
    code: 'Menlo, Monaco, Consolas, system-ui, monospace'
  text-align: left
  color:
    theme: 'hsl(192 98% 55%)'   # 主题色
    accent: 'hsl(14 100% 57%)'   # 强调色
    link: 'hsl(207 90% 54%)'     # 链接颜色
  leftbar:
    background-color: var(--card)
    blur-px: 100px
    blur-bg: var(--bg-a60)
    background-opacity: 0.8
  header_prefix:
    h2:
    h3:
    h4:
    h5:


######## 插件 ########
plugins:
  # 代码块复制按钮
  copycode:
    enable: true
    default_text: 'Copy'
    success_text: 'Copied'
    toast: 复制成功

  # 图片点击放大
  fancybox:
    enable: true
    selector: .md-text img
